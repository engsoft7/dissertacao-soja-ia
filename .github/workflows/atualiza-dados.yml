# Atualização automática da base PAM/IBGE + coleta GEE de safra nova.
# Roda todo dia 15 e pode ser disparado manualmente na aba Actions.
# - Revisões do IBGE em anos já presentes: abre um PR com o CSV atualizado.
# - Safra nova no SIDRA:
#     * com o secret GEE_SERVICE_ACCOUNT_JSON configurado, coleta as variáveis
#       ambientais no Earth Engine e inclui a safra no mesmo PR;
#     * sem o secret (ou se a coleta falhar), abre uma issue com o passo a passo.
name: Atualiza base de dados (PAM/IBGE)

on:
  schedule:
    - cron: "0 9 15 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  TEM_CHAVE_GEE: ${{ secrets.GEE_SERVICE_ACCOUNT_JSON != '' }}

jobs:
  atualiza:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instala dependências
        run: pip install --quiet pandas requests

      - name: Consulta o SIDRA e aplica revisões
        id: pam
        env:
          RESUMO_MD: /tmp/resumo_pam.md
        run: python 07_automacao/atualiza_pam.py

      - name: Coleta a safra nova no Earth Engine
        id: gee
        if: steps.pam.outputs.novo_ano != '' && env.TEM_CHAVE_GEE == 'true'
        env:
          GEE_SERVICE_ACCOUNT_JSON: ${{ secrets.GEE_SERVICE_ACCOUNT_JSON }}
          GEE_PROJECT: ${{ vars.GEE_PROJECT }}
          RESUMO_MD: /tmp/resumo_pam.md
        run: |
          pip install --quiet earthengine-api
          python 07_automacao/coleta_gee_safra.py --ano "${{ steps.pam.outputs.novo_ano }}"

      - name: Abre PR com as mudanças na base
        if: steps.pam.outputs.csv_alterado == 'true' || steps.gee.outputs.csv_alterado == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automacao/atualiza-base
          add-paths: dados/*.csv
          commit-message: "Atualiza a base do painel com dados oficiais (PAM/SIDRA + GEE)"
          title: "Atualização automática da base do painel"
          body-path: /tmp/resumo_pam.md
          delete-branch: true

      - name: Abre issue para a safra nova (sem chave GEE ou coleta falhou)
        if: always() && steps.pam.outputs.novo_ano != '' && (env.TEM_CHAVE_GEE != 'true' || steps.gee.outcome == 'failure')
        uses: actions/github-script@v7
        env:
          NOVO_ANO: ${{ steps.pam.outputs.novo_ano }}
          COLETA_FALHOU: ${{ steps.gee.outcome == 'failure' }}
        with:
          script: |
            const ano = process.env.NOVO_ANO;
            const falhou = process.env.COLETA_FALHOU === "true";
            const titulo = `Safra ${ano} disponível no SIDRA — coletar variáveis no GEE`;
            const abertas = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", per_page: 100,
            });
            if (abertas.data.some(i => i.title === titulo)) {
              core.info("Issue já existe; nada a fazer.");
              return;
            }
            const execucao = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let corpo = `O SIDRA já publica o rendimento da soja para a safra ${ano} ` +
              `nos municípios do Pará, mas a base do painel ainda não tem as variáveis ` +
              `ambientais desse ano.\n\n`;
            corpo += falhou
              ? `A coleta automática no Earth Engine **falhou** — veja o log em ${execucao}.\n\n`
              : `A coleta automática está desativada (secret \`GEE_SERVICE_ACCOUNT_JSON\` ` +
                `não configurado; ver seção "Atualização automática dos dados" do README).\n\n`;
            corpo += `Alternativa manual:\n` +
              `1. Rode \`01_coleta_dados/02_coleta_gee_com_mascara_mapbiomas.py\` no ` +
              `Google Colab com \`ANO_FIM = ${ano}\`.\n` +
              `2. Anexe as linhas novas a \`dados/soja_para_mascarado_2001_2024.csv\`.\n` +
              `3. Abra um PR — o merge atualiza o painel publicado automaticamente.`;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: titulo, body: corpo, labels: ["dados"],
            });

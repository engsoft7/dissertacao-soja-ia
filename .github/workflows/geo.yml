name: GERA GEO (temporaria)
on:
  workflow_dispatch:
  push:
    branches: [claude/verification-check-d1josi]
    paths: ['07_automacao/gera_geo_para.py', '.github/workflows/geo.yml']
jobs:
  geo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet requests
      - run: python 07_automacao/gera_geo_para.py
      - name: Commita o GeoJSON gerado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/para_geo.json
          git commit -m "TEMP: gera contorno do Pará" || echo "sem mudanças"
          git push

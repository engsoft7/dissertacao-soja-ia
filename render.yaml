services:
  - type: web
    name: agrointeligencia-api
    env: python
    buildCommand: "pip install -r requirements.txt && pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
